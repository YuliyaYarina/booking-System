<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 350px;
            transition: all 0.3s ease;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #000000;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .login-container input:focus {
            border-color: #2575fc;
            box-shadow: 0 0 8px rgba(37, 117, 252, 0.3);
            outline: none;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-container button:hover {
            background-color: #333333;
        }

        .login-container .error {
            color: red;
            text-align: center;
            margin-bottom: 16px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .login-container .error.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Вход</h2>

    <div class="error" id="errorMsg"></div>

    <form method="post" action="/login" id="loginForm">
        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
</div>


<script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMsg');

    form.addEventListener('submit', function(e) {

        // Пример локальной проверки для демонстрации анимации ошибки
        if(errorDiv.textContent.trim() !== "") {
            // Вход успешен, форма отправится на сервер
            errorDiv.classList.remove('show');
        } else {
            e.preventDefault(); // блокируем отправку, если ошибка
            errorDiv.textContent = 'Неправильный логин или пароль';
            errorDiv.classList.add('show');

            // Скрываем ошибку через 3 секунды
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 2000);
        }
    });
</script>

</body>
</html>
