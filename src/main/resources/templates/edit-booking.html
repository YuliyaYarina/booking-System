<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование записи</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        .container {
            width: 700px;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        input:focus {
            border-color: #2575fc;
            outline: none;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button,
        .back-link {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            font-size: 14px;
        }

        button {
            background: black;
            color: white;
        }

        button:hover {
            background: #333;
        }

        .back-link {
            background: #e9ecef;
            color: #111;
        }

        .back-link:hover {
            background: #dce1e6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Редактировать запись</h1>

        <form th:action="@{'/web/bookings/edit/' + ${booking.id}}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-row">
                <input type="text" name="clientName" th:value="${booking.clientName}" placeholder="Имя" required>
                <input type="text" name="phone" th:value="${booking.phone}" placeholder="Телефон" required>
                <input type="datetime-local"
                       name="bookingTime"
                       th:value="${#temporals.format(booking.bookingTime, 'yyyy-MM-dd''T''HH:mm')}"
                       required>
            </div>

            <div class="actions">
                <button type="submit">Сохранить</button>
                <a th:href="@{/web/bookings}" class="back-link">Отмена</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
