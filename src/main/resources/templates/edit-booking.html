<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование записи</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f0f2f5; }
        .container { width: min(1200px, 95vw); margin: 40px auto; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,.1); }
        h1 { margin: 0 0 20px; }

        .form-row { display: flex; gap: 10px; }
        .form-row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .description-row { margin-top: 10px; }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-height: 90px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        input:focus, textarea:focus { border-color: #2575fc; outline: none; }

        .actions { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
        button, .back-link {
            height: 40px;
            padding: 0 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
        }

        button { background: #111; color: #fff; }
        button:hover { background: #333; }
        .back-link { background: #f5f5f5; color: #1f1f1f; border: 1px solid #ddd; }
        .back-link:hover { background: #eaeaea; }

        @media (max-width: 980px) {
            .container { width: 100%; padding: 0 12px; }
            .form-row { flex-wrap: wrap; }
            .form-row input { width: 100%; flex: 1 1 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Редактировать запись</h1>

        <form th:action="@{'/web/bookings/edit/' + ${booking.id}}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-row">
                <input type="text" name="clientName" th:value="${booking.clientName}" placeholder="Имя" required>
                <input type="text" name="phone" th:value="${booking.phone}" placeholder="Телефон" required>
                <input type="datetime-local"
                       name="bookingTime"
                       th:value="${#temporals.format(booking.bookingTime, 'yyyy-MM-dd''T''HH:mm')}"
                       required>
            </div>

            <div class="description-row">
                <textarea name="workDescription" placeholder="Описание работ" required th:text="${booking.workDescription}"></textarea>
            </div>

            <div class="actions">
                <button type="submit">Сохранить</button>
                <a th:href="@{/web/bookings}" class="back-link">Отмена</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
