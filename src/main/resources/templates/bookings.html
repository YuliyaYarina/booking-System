<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Записи</title>

    <style>

        /* ===== 1. ОСНОВА ===== */
        * {
            box-sizing: border-box; /* чтобы ширина считалась правильно */
        }

        /* ===== 2. СТРАНИЦА ===== */
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        /* ===== 3. ОБЩИЙ КОНТЕЙНЕР ===== */
        .container {
            width: min(1200px, 95vw);
            margin: 40px auto;
        }

        /* выход с аккаунта*/
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logout-form {
            margin: 0;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .logout-btn:hover {
            background: #333;
        }

        .logout-arrow {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-top: 2px solid #fff;
            border-right: 2px solid #fff;
            transform: rotate(45deg);
            margin-right: 2px;
        }

        /* ===== 4. КАРТОЧКА ===== */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* ===== 5. ЗАГОЛОВОК ===== */
        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        /* ===== 6. ФОРМА ===== */
        .form-row {
            display: flex;
            gap: 10px; /* расстояние между полями */
        }

        /* ===== 7. INPUT ===== */
        .form-row input {
            flex: 1; /* все поля одинаковой ширины */
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .filter-date,
        .filter-master {
            height: 42px;
            padding: 0 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-height: 90px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        /* эффект при клике */
        .form-row input:focus,
        textarea:focus,
        .filter-date:focus,
        .filter-master:focus {
            border-color: #2575fc;
            outline: none;
        }

        .description-row {
            margin-top: 10px;
        }

        .filter-card {
            padding: 14px 16px;
            background: #fff;
        }

        .filters-form {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .filter-fields {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #7a7a7a;
            font-weight: 600;
        }

        .filter-date,
        .filter-master {
            width: 100%;
            min-width: 0;
            background: #fff;
        }

        .filter-group-date {
            flex: 1 1 190px;
        }

        .filter-group-master {
            flex: 1 1 220px;
        }

        .filter-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: stretch;
            flex: 0 0 auto;
            min-width: 232px;
        }

        .filter-actions button,
        .filter-actions .btn {
            min-width: 112px;
            text-align: center;
        }

        .filter-actions-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: transparent;
            user-select: none;
            font-weight: 600;
            line-height: 1;
            height: 16px;
        }

        .filter-actions-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #1f1f1f;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #eaeaea;
        }

        :root {
            --btn-height: 40px;
            --btn-font-size: 14px;
            --btn-font-weight: 600;
            --btn-radius: 6px;
            --btn-padding-x: 16px;
        }

        .btn,
        button,
        .filter-actions .btn,
        .filter-actions button,
        .actions .btn,
        .actions button {
            height: var(--btn-height);
            min-height: var(--btn-height);
            padding: 0 var(--btn-padding-x);
            border-radius: var(--btn-radius);
            font-family: Arial, sans-serif;
            font-size: var(--btn-font-size);
            font-weight: var(--btn-font-weight);
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
            vertical-align: middle;
            white-space: nowrap;
        }


        /* ===== 8. КНОПКА ===== */
        button {
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        /* ===== 9. ТАБЛИЦА ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            min-width: 900px;  /* защищает таблицу от «ломания» колонок. */
        }

        /* заголовки */
        th {
            text-align: left;
            padding: 14px;
            background: #fafafa;
        }

        /* строки */
        td {
            padding: 14px;
            border-top: 1px solid #eee;
            vertical-align: top;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 30%;
        }

        td:nth-child(3) {
            white-space: pre-wrap;
            word-break: break-word;
            /*overflow-wrap: anywhere;*/
        }

        th:last-child,
        td:last-child {
            width: 220px;
        }

        .actions-cell {
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .actions form {
            margin: 0;
        }

        /* эффект наведения */
        tr:hover {
            background: #f9f9f9;
        }
        /* ===== КРАСНЫЙ (удаление) ===== */
        table button[type="submit"] {
            background: #e74c3c;
            margin-right: 0;
        }

        table button[type="submit"]:hover {
            background: #c0392b;
        }

        /* ===== СИНИЙ (редактирование) ===== */
        button[type="button"] {
            background: #3498db;
        }

        button[type="button"]:hover {
            background: #2980b9;
        }

        .btn { /* синяя кнопка "Изменить" */
            background: #3498db;
            color: #fff;
        }

            .btn:hover {
                background: #2980b9;
            }

            .table-wrapper { /* добавляет прокрутку вместо сдвигов макета */
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            @media (max-width: 980px) { /* адаптирует форму под узкие экраны */
                .container {
                    width: 100%;
                    padding: 0 12px;
                }

                .form-row {
                    flex-wrap: wrap;
                }

                .form-row input,
                .button-row {
                    width: 100%;
                    flex: 1 1 100%;
                }

                .filters-form {
                    flex-wrap: wrap;
                    align-items: stretch;
                }

                .filter-fields {
                    width: 100%;
                    flex-wrap: wrap;
                }

                .filter-group-date,
                .filter-group-master {
                    flex: 1 1 100%;
                }

                .filter-actions {
                    width: 100%;
                    min-width: 0;
                }

                .filter-actions-label {
                    display: none;
                }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Записи клиентов</h1>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">
                <span class="logout-arrow" aria-hidden="true"></span>
                Выйти
            </button>
        </form>
    </div>


    <!-- ===== КАРТОЧКА С ФОРМОЙ ===== -->
    <div class="card">

        <!--
        Форма отправляет POST запрос на /web/bookings
        -->
        <form th:action="@{/web/bookings}" method="post">

            <!-- CSRF защита (обязательно для POST) -->
            <!-- Spring проверяет, что запрос отправлен с сайта -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-row">

                <!--
                name="clientName"
                ↓
                попадёт в контроллер как @RequestParam String clientName
                -->
                <input type="text" name="clientName" placeholder="Имя" required>

                <!--
                name="phone"
                ↓
                попадёт в контроллер
                -->
                <input type="text" name="phone" placeholder="Телефон" required>

                <!--
                datetime-local = встроенный выбор даты и времени
                -->
                <input type="datetime-local" name="bookingTime" required>

                <button type="submit">Добавить</button>

            </div>
            <div class="description-row">
                <textarea name="workDescription" placeholder="Описание работ" required></textarea>
            </div>

        </form>

    </div>

    <div class="card filter-card">
        <form th:action="@{/web/bookings}" method="get" class="filters-form">
            <div class="filter-fields">
                <div class="filter-group filter-group-date">
                    <label for="bookingDay">День записи</label>
                    <input id="bookingDay" class="filter-date" type="date" name="bookingDay" th:value="${selectedBookingDay}">
                </div>

                <div class="filter-group filter-group-master" th:if="${isAdmin}">
                    <label for="masterId">Мастер</label>
                    <select id="masterId" name="masterId" class="filter-master">
                        <option value="">Все мастера</option>
                        <option th:each="master : ${masters}"
                                th:value="${master.id}"
                                th:text="${master.username}"
                                th:selected="${selectedMasterId != null and selectedMasterId == master.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="filter-actions">
                <span class="filter-actions-label" aria-hidden="true">Действия</span>
                <div class="filter-actions-buttons">
                    <button type="submit">Применить</button>
                    <a th:href="@{/web/bookings}" class="btn btn-secondary">Сбросить</a>
                </div>
            </div>
        </form>
    </div>

    <!-- ===== форма фильтрации ===== -->
    <script>
        function confirmDelete() {
            return confirm("Вы уверены, что хотите удалить эту запись?");
        }
    </script>
    <!-- ===== КАРТОЧКА С ТАБЛИЦЕЙ ===== -->
    <div class="card">

        <div class="table-wrapper">
        <table>

            <tr>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Описание работ</th>
                <th>Дата</th>
                <th th:if="${isAdmin}">Специалист</th>
                <th>Действия</th>
            </tr>

            <!--
            th:each="b : ${bookings}"
            ↓
            Spring передаёт список bookings из контроллера
            -->
            <tr th:each="b : ${upcomingBookings}">
                <!--
                th:text заменяет содержимое ячейки
                -->
                <td th:text="${b.clientName}"></td>
                <td th:text="${b.phone}"></td>
                <td th:text="${b.workDescription}"></td>
                <!-- Красивый формат даты -->
                <td th:text="${#temporals.format(b.bookingTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:if="${isAdmin}" th:text="${b.user != null ? b.user.username : '-'}"></td>
                <td class="actions-cell">
                    <div class="actions">

                    <!-- ===== УДАЛЕНИЕ ===== -->
                    <form th:action="@{'/web/bookings/delete/' + ${b.id}}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirmDelete()">
<!--                        ?????????????????????????????????????????????????????????????????/????????????????????-->
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
<!--                        ??????????????????????????????????????????????????????????????????????????????????-->
                        <button type="submit">Удалить</button>
                    </form>


                    <!-- ===== РЕДАКТИРОВАНИЕ ===== -->
                    <!-- Переход на страницу редактирования -->

                    <a th:href="@{'/web/bookings/edit/' + ${b.id}}" class="btn">Изменить</a>
                    </div>
                </td>

            </tr>

        </table>
            </div>
    </div>

    <div class="card" th:if="${#lists.size(passedBookings) > 0}">
        <h2>Прошедшие записи за выбранный день</h2>
        <div class="table-wrapper">
            <table>
                <tr>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Описание работ</th>
                    <th>Дата</th>
                    <th th:if="${isAdmin}">Специалист</th>
                    <th>Действия</th>
                </tr>

                <tr th:each="b : ${passedBookings}">
                    <td th:text="${b.clientName}"></td>
                    <td th:text="${b.phone}"></td>
                    <td th:text="${b.workDescription}"></td>
                    <td th:text="${#temporals.format(b.bookingTime, 'dd.MM.yyyy HH:mm')}"></td>
                    <td th:if="${isAdmin}" th:text="${b.user != null ? b.user.username : '-'}"></td>
                    <td class="actions-cell">
                        <div class="actions">
                            <form th:action="@{'/web/bookings/delete/' + ${b.id}}"
                                  method="post"
                                  style="display:inline;"
                                  onsubmit="return confirmDelete()">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <button type="submit">Удалить</button>
                            </form>
                            <a th:href="@{'/web/bookings/edit/' + ${b.id}}" class="btn">Изменить</a>
                        </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>

</div>
</body>
</html>
