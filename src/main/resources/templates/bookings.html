<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Записи</title>

    <style>

        /* ===== 1. ОСНОВА ===== */
        * {
            box-sizing: border-box; /* чтобы ширина считалась правильно */
        }

        /* ===== 2. СТРАНИЦА ===== */
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        /* ===== 3. ОБЩИЙ КОНТЕЙНЕР ===== */
        .container {
            width: min(1200px, 95vw);
            margin: 40px auto;
        }

        /* выход с аккаунта*/
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logout-form {
            margin: 0;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .logout-btn:hover {
            background: #333;
        }

        .logout-arrow {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-top: 2px solid #fff;
            border-right: 2px solid #fff;
            transform: rotate(45deg);
            margin-right: 2px;
        }

        /* ===== 4. КАРТОЧКА ===== */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* ===== 5. ЗАГОЛОВОК ===== */
        h1 {
            margin-bottom: 20px;
        }

        /* ===== 6. ФОРМА ===== */
        .form-row {
            display: flex;
            gap: 10px; /* расстояние между полями */
        }

        /* ===== 7. INPUT ===== */
        input {
            flex: 1; /* все поля одинаковой ширины */
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-height: 90px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        /* эффект при клике */
        input:focus,
        textarea:focus {
            border-color: #2575fc;
            outline: none;
        }

        .description-row {
            margin-top: 10px;
        }

        /* ===== 8. КНОПКА ===== */
        button {
            padding: 12px 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        /* ===== 9. ТАБЛИЦА ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            min-width: 900px;  /* защищает таблицу от «ломания» колонок. */
        }

        /* заголовки */
        th {
            text-align: left;
            padding: 14px;
            background: #fafafa;
        }

        /* строки */
        td {
            padding: 14px;
            border-top: 1px solid #eee;
            vertical-align: top;
        }

        th:nth-child(4),
        td:nth-child(4) {
            width: 30%;
        }

        td:nth-child(4) {
            white-space: pre-wrap;
            word-break: break-word;
        }

        th:last-child,
        td:last-child {
            width: 220px;
        }

        .actions-cell {
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .actions form {
            margin: 0;
        }

        /* эффект наведения */
        tr:hover {
            background: #f9f9f9;
        }
        /* ===== КРАСНЫЙ (удаление) ===== */
        table button[type="submit"] {
            background: #e74c3c;
            margin-right: 0;
            padding: 10px 14px;
        }

        table button[type="submit"]:hover {
            background: #c0392b;
        }

        /* ===== СИНИЙ (редактирование) ===== */
        button[type="button"] {
            background: #3498db;
        }

        button[type="button"]:hover {
            background: #2980b9;
        }

        .btn { /* синяя кнопка "Изменить" */
            display: inline-block;
            padding: 10px 14px;
            background: #3498db;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

            .btn:hover {
                background: #2980b9;
            }

            .table-wrapper { /* добавляет прокрутку вместо сдвигов макета */
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            @media (max-width: 980px) { /* адаптирует форму под узкие экраны */
                .container {
                    width: 100%;
                    padding: 0 12px;
                }

                .form-row {
                    flex-wrap: wrap;
                }

                .form-row input,
                .button-row {
                    width: 100%;
                    flex: 1 1 100%;
                }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Записи клиентов</h1>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">
                <span class="logout-arrow" aria-hidden="true"></span>
                Выйти
            </button>
        </form>
    </div>


    <!-- ===== КАРТОЧКА С ФОРМОЙ ===== -->
    <div class="card">

        <!--
        Форма отправляет POST запрос на /web/bookings
        -->
        <form th:action="@{/web/bookings}" method="post">

            <!-- CSRF защита (обязательно для POST) -->
            <!-- Spring проверяет, что запрос отправлен с сайта -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-row">

                <!--
                name="clientName"
                ↓
                попадёт в контроллер как @RequestParam String clientName
                -->
                <input type="text" name="clientName" placeholder="Имя" required>

                <!--
                name="phone"
                ↓
                попадёт в контроллер
                -->
                <input type="text" name="phone" placeholder="Телефон" required>

                <!--
                datetime-local = встроенный выбор даты и времени
                -->
                <input type="datetime-local" name="bookingTime" required>

                <button type="submit">Добавить</button>

            </div>
            <div class="description-row">
                <textarea name="workDescription" placeholder="Описание работ" required></textarea>
            </div>

        </form>

    </div>

    <!-- ===== форма фильтрации ===== -->
    <script>
        function confirmDelete() {
            return confirm("Вы уверены, что хотите удалить эту запись?");
        }
    </script>
    <!-- ===== КАРТОЧКА С ТАБЛИЦЕЙ ===== -->
    <div class="card">

        <div class="table-wrapper">
        <table>

            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Описание работ</th>
                <th>Дата</th>
                <th>Действия</th>
            </tr>

            <!--
            th:each="b : ${bookings}"
            ↓
            Spring передаёт список bookings из контроллера
            -->
            <tr th:each="b : ${bookings}">

                <!--
                th:text заменяет содержимое ячейки
                -->
                <td th:text="${b.id}"></td>
                <td th:text="${b.clientName}"></td>
                <td th:text="${b.phone}"></td>
                <td th:text="${b.workDescription}"></td>
                <!-- Красивый формат даты -->
                <td th:text="${#temporals.format(b.bookingTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td class="действия-ячейка">
                    <div class="действия">

                    <!-- ===== УДАЛЕНИЕ ===== -->
                    <form th:action="@{'/web/bookings/delete/' + ${b.id}}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirmDelete()">
<!--                        ?????????????????????????????????????????????????????????????????/????????????????????-->
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
<!--                        ??????????????????????????????????????????????????????????????????????????????????-->
                        <button type="submit">Удалить</button>
                    </form>


                    <!-- ===== РЕДАКТИРОВАНИЕ ===== -->
                    <!-- Переход на страницу редактирования -->

                    <a th:href="@{'/web/bookings/edit/' + ${b.id}}" class="btn">Изменить</a>
                    </div>
                </td>

            </tr>

        </table>
            </div>
<!--        <=========Pagination (странички) =========>-->
        <div style="margin-top:15px;">
    <span th:if="${page > 1}">
        <a th:href="@{/web/bookings(page=${page - 1})}">« Назад</a>
    </span>
            <span th:text="${page}">1</span>
            <span th:if="${hasNext}">
        <a th:href="@{/web/bookings(page=${page + 1})}">Вперед »</a>
    </span>
        </div>

    </div>

</div>
</body>
</html>
