<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Записи</title>

    <style>

        /* ===== 1. ОСНОВА ===== */
        * {
            box-sizing: border-box; /* чтобы ширина считалась правильно */
        }

        /* ===== 2. СТРАНИЦА ===== */
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        /* ===== 3. ОБЩИЙ КОНТЕЙНЕР ===== */
        .container {
            width: 900px;
            margin: 40px auto;
        }

        /* ===== 4. КАРТОЧКА ===== */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* ===== 5. ЗАГОЛОВОК ===== */
        h1 {
            margin-bottom: 20px;
        }

        /* ===== 6. ФОРМА ===== */
        .form-row {
            display: flex;
            gap: 10px; /* расстояние между полями */
        }

        /* ===== 7. INPUT ===== */
        input {
            flex: 1; /* все поля одинаковой ширины */
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        /* эффект при клике */
        input:focus {
            border-color: #2575fc;
            outline: none;
        }

        /* ===== 8. КНОПКА ===== */
        button {
            padding: 12px 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        /* ===== 9. ТАБЛИЦА ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* заголовки */
        th {
            text-align: left;
            padding: 12px;
            background: #fafafa;
        }

        /* строки */
        td {
            padding: 12px;
            border-top: 1px solid #eee;
        }

        /* эффект наведения */
        tr:hover {
            background: #f9f9f9;
        }
        /* ===== КРАСНЫЙ (удаление) ===== */
        button[type="submit"] {
            background: #e74c3c;
        }

        button[type="submit"]:hover {
            background: #c0392b;
        }

        /* ===== СИНИЙ (редактирование) ===== */
        button[type="button"] {
            background: #3498db;
        }

        button[type="button"]:hover {
            background: #2980b9;
        }

        /* отступ между кнопками */
        button {
            margin-right: 5px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- ===== КАРТОЧКА С ФОРМОЙ ===== -->
    <div class="card">

        <h1>Записи клиентов</h1>

        <!--
        Форма отправляет POST запрос на /web/bookings
        -->
        <form action="/web/bookings" method="post">

            <!-- CSRF защита (обязательно для POST) -->
            <!-- Spring проверяет, что запрос отправлен с сайта -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-row">

                <!--
                name="clientName"
                ↓
                попадёт в контроллер как @RequestParam String clientName
                -->
                <input type="text" name="clientName" placeholder="Имя" required>

                <!--
                name="phone"
                ↓
                попадёт в контроллер
                -->
                <input type="text" name="phone" placeholder="Телефон" required>

                <!--
                datetime-local = встроенный выбор даты и времени
                -->
                <input type="datetime-local" name="bookingTime" required>

                <button type="submit">Добавить</button>

            </div>

        </form>

    </div>

    <!-- ===== форма фильтрации ===== -->
    <script>
        function confirmDelete() {
            return confirm("Вы уверены, что хотите удалить эту запись?");
        }
    </script>
    <!-- ===== КАРТОЧКА С ТАБЛИЦЕЙ ===== -->
    <div class="card">

        <table>

            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Дата</th>
                <th>Действия</th>
            </tr>

            <!--
            th:each="b : ${bookings}"
            ↓
            Spring передаёт список bookings из контроллера
            -->
            <tr th:each="b : ${bookings}">

                <!--
                th:text заменяет содержимое ячейки
                -->
                <td th:text="${b.id}"></td>
                <td th:text="${b.clientName}"></td>
                <td th:text="${b.phone}"></td>
                <!-- Красивый формат даты -->
                <td th:text="${#temporals.format(b.bookingTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td>

                    <!-- ===== УДАЛЕНИЕ ===== -->
                    <form th:action="@{'/web/bookings/delete/' + ${b.id}}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirmDelete()">
<!--                        ?????????????????????????????????????????????????????????????????/????????????????????-->
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
<!--                        ??????????????????????????????????????????????????????????????????????????????????-->
                        <button type="submit">Удалить</button>
                    </form>


                    <!-- ===== РЕДАКТИРОВАНИЕ ===== -->
                    <!-- Переход на страницу редактирования -->
                    <a th:href="@{'/web/bookings/edit/' + ${b.id}}">
                        class="btn">Изменить</a>

                </td>

            </tr>

        </table>
<!--        <=========Pagination (странички) =========>-->
        <div style="margin-top:15px;">
    <span th:if="${page > 1}">
        <a th:href="@{/web/bookings(page=${page - 1})}">« Назад</a>
    </span>
            <span th:text="${page}">1</span>
            <span th:if="${hasNext}">
        <a th:href="@{/web/bookings(page=${page + 1})}">Вперед »</a>
    </span>
        </div>

    </div>

</div>

           th:value="${_csrf.token}"/>

</body>
</html>
